name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        run: ./gradlew assembleDebug 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Post errors as gist on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERRORS=$(grep -E "error:|Error:|FAILED|Exception" build.log | head -60 || true)
          TAIL=$(tail -80 build.log || true)
          gh gist create --public --desc "Build errors run ${{ github.run_number }}" \
            <(echo "=== ERRORS ==="; echo "$ERRORS"; echo ""; echo "=== TAIL ==="; echo "$TAIL")

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SubTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
