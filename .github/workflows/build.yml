name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install debug keystore
        run: |
          mkdir -p ~/.android
          cp keystore/debug.keystore ~/.android/debug.keystore
          echo "Keystore SHA1:"
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>&1 | grep "SHA1:"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'keystore/debug.keystore') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Verify APK signing and write SHA1 to summary
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          echo "## APK Certificate" >> $GITHUB_STEP_SUMMARY
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner verify --print-certs \
            app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY 2>&1
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Keystore SHA1 used:" >> $GITHUB_STEP_SUMMARY
          keytool -list -v -keystore keystore/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android 2>&1 \
            | grep "SHA1:" >> $GITHUB_STEP_SUMMARY

      - name: Save errors to step summary and repo
        if: failure()
        run: |
          echo "## Build Errors" >> $GITHUB_STEP_SUMMARY
          grep -E "error:|Error|FAILED|Exception|Unresolved" build.log | head -50 >> $GITHUB_STEP_SUMMARY || true
          tail -100 build.log >> $GITHUB_STEP_SUMMARY || true
          git config user.email "ci@trackify.build"
          git config user.name "CI Bot"
          tail -200 build.log > build-error.log
          git add build-error.log
          git diff --cached --quiet || git commit -m "ci: build error log run ${{ github.run_number }} [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SubTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
