name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Save errors to step summary and repo
        if: failure()
        run: |
          echo "## Build Errors" >> $GITHUB_STEP_SUMMARY
          grep -E "error:|Error|FAILED|Exception|Unresolved" build.log | head -50 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Last 100 lines" >> $GITHUB_STEP_SUMMARY
          tail -100 build.log >> $GITHUB_STEP_SUMMARY || true

          # Also commit to repo
          git config user.email "ci@trackify.build"
          git config user.name "CI Bot"
          tail -200 build.log > build-error.log
          git add build-error.log
          git diff --cached --quiet || git commit -m "ci: build error log run ${{ github.run_number }} [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SubTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
